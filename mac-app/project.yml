# OpenObject Mac app — XcodeGen project spec (MAC-APP-PLAN §B; HANDOFF §20, 2026-07-01).
#
# This YAML is the maintainable source of truth for the Xcode project; `xcodegen generate`
# produces OpenObject.xcodeproj from it. The generated .xcodeproj is ALSO committed, so the app
# builds with only `xcodebuild` and no extra tooling (the "checked-in Xcode project" decision,
# 2026-07-01). Regenerate after editing this file: `cd mac-app && xcodegen generate`.
#
# Phase B1a: a buildable skeleton — a Dock icon + window AND a menu-bar item, nothing else yet.
# No bundled Node / player/ (that is B1b), no server (B2). Unsigned/local; the Queueue Studios LLC
# Developer ID, hardened runtime, and notarization are wired in Phase C.

name: OpenObject

options:
  bundleIdPrefix: io.openobject
  deploymentTarget:
    macOS: "15.0"       # macOS 15+ only (Matt, 2026-07-03); MenuBarExtra needs 13+, this is a superset
  createIntermediateGroups: true

# Sparkle: the standard self-update framework for Mac apps distributed outside the App Store
# (MAC-APP-PLAN §C3). Pulled via SPM so there's nothing to vendor; Xcode embeds + signs it.
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

settings:
  base:
    ARCHS: arm64        # Apple Silicon only for v1 (universal is a Phase C expansion if wanted)
    ONLY_ACTIVE_ARCH: "NO"
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.2.0"   # matches the engine; Phase C's release workflow auto-syncs this
    CURRENT_PROJECT_VERSION: "5"
    # Local/unsigned for now so it builds and runs without a Developer ID. Phase C sets the real
    # signing identity (Queueue Studios LLC), hardened runtime, and entitlements.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"

targets:
  OpenObject:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: Sparkle
    # A real Info.plist (not the auto-generated one) so we can carry Sparkle's SUFeedURL / SUPublicEDKey.
    # xcodegen fills the standard CFBundle keys (name, id, versions) from the build settings; we add the
    # display name, Dock-icon flag, copyright, and Sparkle keys here.
    info:
      path: OpenObject-Info.plist
      properties:
        # Reference the version build settings (a custom Info.plist otherwise gets xcodegen's literal
        # 1.0 / 1 defaults, which is what shipped the wrong version the first time). Xcode expands these.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: OpenObject
        LSUIElement: false        # NO = show a Dock icon (we want BOTH Dock and menu bar)
        NSHumanReadableCopyright: "Copyright 2026 Queueue Studios LLC. All rights reserved."
        # Sparkle auto-update (MAC-APP-PLAN §C3). The PRIVATE half of SUPublicEDKey lives in Matt's
        # keychain (from Sparkle's generate_keys); the appcast is served from the site (gh-pages) at a
        # stable URL. SUPublicEDKey is a placeholder until the key is generated.
        SUFeedURL: https://openobject.io/appcast.xml
        SUPublicEDKey: ud/UBl/N0ycZ6iOGDGTErGIy153/JJgCfrXX/9dtOBg=
    settings:
      base:
        PRODUCT_NAME: OpenObject
        PRODUCT_BUNDLE_IDENTIFIER: io.openobject.OpenObject
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      # B1b: stage the pinned Node runtime + a snapshot of player/ into the built .app's Resources
      # (the engine ships INSIDE the app; the Mac can't git-pull). Always runs. Phase C moves this
      # ahead of the codesign step and signs the nested node binary.
      - name: Bundle engine (Node + player)
        script: '"$SRCROOT/scripts/bundle-engine.sh"'
        basedOnDependencyAnalysis: false
